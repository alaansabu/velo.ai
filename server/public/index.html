<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velo.ai — Voice Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f0f13;
      color: #e4e4e7;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    h1 { font-size: 1.4rem; font-weight: 600; color: #a78bfa; }

    /* ── Orb visualiser ──────────────────────────── */
    .orb-wrapper {
      position: relative;
      width: 200px;
      height: 200px;
    }
    .orb {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #7c3aed, #4c1d95);
      box-shadow: 0 0 60px rgba(124, 58, 237, 0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .orb.listening {
      animation: pulse 1.5s ease-in-out infinite;
      box-shadow: 0 0 80px rgba(124, 58, 237, 0.5);
    }
    .orb.speaking {
      animation: speak 0.4s ease-in-out infinite alternate;
      background: radial-gradient(circle at 40% 40%, #a78bfa, #6d28d9);
      box-shadow: 0 0 100px rgba(167, 139, 250, 0.5);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes speak {
      0% { transform: scale(1); }
      100% { transform: scale(1.12); }
    }

    .orb-label {
      text-align: center;
      font-size: 0.85rem;
      color: #71717a;
      margin-top: 8px;
      min-height: 20px;
    }

    /* ── Call button ──────────────────────────────── */
    .call-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }
    .call-btn:active { transform: scale(0.95); }

    .call-btn.start {
      background: #065f46;
      color: #6ee7b7;
    }
    .call-btn.start:hover { background: #047857; }

    .call-btn.end {
      background: #991b1b;
      color: #fca5a5;
    }
    .call-btn.end:hover { background: #7f1d1d; }

    /* ── Transcript log ──────────────────────────── */
    #transcript {
      width: 100%;
      max-width: 480px;
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 16px;
    }
    .t-line {
      font-size: 0.82rem;
      line-height: 1.4;
      animation: fadeIn 0.2s ease;
    }
    .t-line.user  { color: #a78bfa; }
    .t-line.agent { color: #e4e4e7; }
    .t-line.sys   { color: #52525b; text-align: center; font-size: 0.75rem; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    #transcript::-webkit-scrollbar { width: 4px; }
    #transcript::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>⚡ Velo.ai Voice Agent</h1>

    <div class="orb-wrapper">
      <div class="orb" id="orb"></div>
    </div>
    <div class="orb-label" id="label">Tap to start a call</div>

    <button class="call-btn start" id="callBtn" onclick="toggleCall()">📞</button>

    <div id="transcript"></div>
  </div>

  <script>
    // ── DOM refs ───────────────────────────────────────────
    const orb       = document.getElementById("orb");
    const label     = document.getElementById("label");
    const callBtn   = document.getElementById("callBtn");
    const transcript = document.getElementById("transcript");

    let ws          = null;
    let mediaStream = null;
    let audioCtx    = null;
    let workletNode = null;
    let isInCall    = false;

    // Agent audio playback context (16 kHz linear16)
    const AGENT_SAMPLE_RATE = 16000;
    let playbackCtx     = null;
    let playbackWorklet = null;

    // ── Helpers ───────────────────────────────────────────
    function log(text, cls = "sys") {
      const d = document.createElement("div");
      d.className = `t-line ${cls}`;
      d.textContent = text;
      transcript.appendChild(d);
      transcript.scrollTop = transcript.scrollHeight;
    }

    function setLabel(txt) { label.textContent = txt; }

    function setOrb(state) {
      orb.className = "orb";
      if (state) orb.classList.add(state);
    }

    // ── Toggle call ───────────────────────────────────────
    async function toggleCall() {
      if (isInCall) {
        endCall();
      } else {
        await startCall();
      }
    }

    // ── Start call ────────────────────────────────────────
    async function startCall() {
      try {
        // 1. Get mic access
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            sampleRate: 24000,
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
          }
        });

        // 2. Set up AudioContext + worklet for PCM capture at 24 kHz
        audioCtx = new AudioContext({ sampleRate: 24000 });

        // Register the PCM worklet processor inline via a Blob
        const workletCode = `
          class PcmProcessor extends AudioWorkletProcessor {
            process(inputs) {
              const input = inputs[0];
              if (input.length > 0) {
                const float32 = input[0];
                // Convert float32 → int16 (linear16)
                const int16 = new Int16Array(float32.length);
                for (let i = 0; i < float32.length; i++) {
                  let s = Math.max(-1, Math.min(1, float32[i]));
                  int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                this.port.postMessage(int16.buffer, [int16.buffer]);
              }
              return true;
            }
          }
          registerProcessor('pcm-processor', PcmProcessor);
        `;
        const blob = new Blob([workletCode], { type: "application/javascript" });
        const url = URL.createObjectURL(blob);
        await audioCtx.audioWorklet.addModule(url);
        URL.revokeObjectURL(url);

        const source = audioCtx.createMediaStreamSource(mediaStream);
        workletNode = new AudioWorkletNode(audioCtx, "pcm-processor");

        workletNode.port.onmessage = (e) => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(e.data); // send raw int16 PCM bytes
          }
        };

        source.connect(workletNode);
        // Keep audio graph alive without sending mic audio to speakers
        const silencer = audioCtx.createGain();
        silencer.gain.value = 0;
        workletNode.connect(silencer);
        silencer.connect(audioCtx.destination);

        // 3. Playback context — use browser's native sample rate.
        //    The worklet resamples 16 kHz → native continuously inside
        //    the ring buffer using a fractional read pointer, so there
        //    are ZERO chunk-boundary clicks.
        playbackCtx = new AudioContext(); // native rate (44100 / 48000)
        console.log(`[Audio] Native playback rate: ${playbackCtx.sampleRate} Hz`);

        const playbackWorkletCode = `
          class PlaybackProcessor extends AudioWorkletProcessor {
            constructor() {
              super();
              // Ring buffer holds RAW 16 kHz source samples (30 seconds)
              this.ring = new Float32Array(16000 * 30);
              this.wIdx = 0;       // integer write index (16 kHz samples)
              this.rPos = 0;       // fractional read position
              this.ratio = 16000 / sampleRate; // e.g. 0.3333 for 48 kHz
              this.started = false;
              // Pre-buffer: 150 ms worth of 16 kHz source samples
              this.bufferThreshold = Math.floor(16000 * 0.15);

              this.port.onmessage = (e) => {
                if (e.data === 'flush') {
                  this.wIdx = 0;
                  this.rPos = 0;
                  this.started = false;
                  return;
                }
                const samples = new Float32Array(e.data);
                for (let i = 0; i < samples.length; i++) {
                  this.ring[this.wIdx] = samples[i];
                  this.wIdx = (this.wIdx + 1) % this.ring.length;
                }
              };
            }

            _available() {
              let n = this.wIdx - Math.floor(this.rPos);
              if (n < 0) n += this.ring.length;
              return n;
            }

            process(inputs, outputs) {
              const out = outputs[0][0];
              const len = this.ring.length;

              // Wait for pre-buffer only on first start (not on underruns)
              if (!this.started) {
                if (this._available() >= this.bufferThreshold) {
                  this.started = true;
                } else {
                  for (let i = 0; i < out.length; i++) out[i] = 0;
                  return true;
                }
              }

              for (let i = 0; i < out.length; i++) {
                if (this._available() > 1) {
                  // Linear interpolation across the continuous ring buffer
                  const idx  = Math.floor(this.rPos) % len;
                  const frac = this.rPos - Math.floor(this.rPos);
                  const s0   = this.ring[idx];
                  const s1   = this.ring[(idx + 1) % len];
                  out[i] = s0 + frac * (s1 - s0);
                  this.rPos += this.ratio;
                  // Keep rPos from growing unbounded
                  if (Math.floor(this.rPos) >= len) this.rPos -= len;
                } else {
                  out[i] = 0; // underrun — output silence, resume instantly
                }
              }
              return true;
            }
          }
          registerProcessor('playback-processor', PlaybackProcessor);
        `;
        const pbBlob = new Blob([playbackWorkletCode], { type: "application/javascript" });
        const pbUrl  = URL.createObjectURL(pbBlob);
        await playbackCtx.audioWorklet.addModule(pbUrl);
        URL.revokeObjectURL(pbUrl);

        playbackWorklet = new AudioWorkletNode(playbackCtx, "playback-processor");
        playbackWorklet.connect(playbackCtx.destination);

        // 4. Connect WebSocket
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${protocol}//${location.host}/ws`);
        ws.binaryType = "arraybuffer";

        ws.onopen = () => {
          isInCall = true;
          callBtn.className = "call-btn end";
          callBtn.textContent = "📵";
          setOrb("listening");
          setLabel("Connecting to agent…");
          log("Call started");
        };

        ws.onmessage = (evt) => {
          // Binary → agent audio
          if (evt.data instanceof ArrayBuffer) {
            playAgentAudio(evt.data);
            return;
          }

          // JSON event
          let data;
          try { data = JSON.parse(evt.data); } catch { return; }

          switch (data.type) {
            case "SessionStarted":
              setLabel("Listening…");
              log(`Session: ${data.sessionId}`);
              break;
            case "SettingsApplied":
              setLabel("🎙️ Speak now");
              setOrb("listening");
              log("Agent ready");
              break;
            case "ConversationText":
              if (data.role === "agent") {
                log(`Agent: ${data.content}`, "agent");
              } else {
                log(`You: ${data.content}`, "user");
              }
              break;
            case "UserStartedSpeaking":
              // Flush queued agent audio on barge-in
              if (playbackWorklet) playbackWorklet.port.postMessage('flush');
              setOrb("listening");
              setLabel("🎙️ Listening…");
              break;
            case "AgentThinking":
              setOrb("");
              setLabel("🤔 Thinking…");
              break;
            case "AgentStartedSpeaking":
              setOrb("speaking");
              setLabel("🗣️ Agent speaking…");
              break;
            case "AgentAudioDone":
              setOrb("listening");
              setLabel("🎙️ Speak now");
              break;
            case "Error":
              log(`❌ ${data.description || "Error"}`, "sys");
              break;
            case "SessionClosed":
              log("Session ended");
              break;
            default:
              break;
          }
        };

        ws.onerror = () => { log("⚠ Connection error"); };
        ws.onclose = () => {
          log("Call ended");
          resetUI();
        };

      } catch (err) {
        log(`❌ ${err.message}`);
        console.error(err);
        resetUI();
      }
    }

    // ── Play agent audio (linear16, 16 kHz) ────────────────
    function playAgentAudio(arrayBuffer) {
      if (!playbackWorklet) return;

      // Convert Int16 → Float32 and push raw 16 kHz samples into the
      // worklet ring buffer. The worklet resamples to native rate
      // continuously, so there are no chunk-boundary clicks.
      const int16   = new Int16Array(arrayBuffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / 0x8000;
      }
      playbackWorklet.port.postMessage(float32.buffer, [float32.buffer]);
    }

    // ── End call ──────────────────────────────────────────
    function endCall() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ action: "stop" }));
        ws.close();
      }
      if (workletNode)      { workletNode.disconnect(); workletNode = null; }
      if (audioCtx)         { audioCtx.close(); audioCtx = null; }
      if (playbackWorklet)  { playbackWorklet.disconnect(); playbackWorklet = null; }
      if (playbackCtx)      { playbackCtx.close(); playbackCtx = null; }
      if (mediaStream)      { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
      resetUI();
    }

    function resetUI() {
      isInCall = false;
      ws = null;
      callBtn.className = "call-btn start";
      callBtn.textContent = "📞";
      setOrb("");
      setLabel("Tap to start a call");
    }
  </script>
</body>
</html>
